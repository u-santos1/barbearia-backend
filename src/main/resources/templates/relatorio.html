<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; font-size: 13px; color: #1a1a1a; padding: 40px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #cfaa70; padding-bottom: 20px; }
        .header h1 { font-size: 26px; color: #cfaa70; letter-spacing: 2px; }
        .header p { color: #666; font-size: 12px; margin-top: 4px; }
        .periodo { text-align: center; font-size: 13px; color: #444; margin-bottom: 25px; }
        .cards { display: flex; gap: 16px; margin-bottom: 30px; }
        .card { flex: 1; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; text-align: center; }
        .card .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .card .valor { font-size: 20px; font-weight: bold; color: #1a1a1a; }
        .card.destaque { background: #cfaa70; border-color: #cfaa70; }
        .card.destaque .label { color: #7a5c1e; }
        .card.destaque .valor { color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        thead tr { background: #1a1a1a; color: #cfaa70; }
        thead th { padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        tbody tr { border-bottom: 1px solid #f0f0f0; }
        tbody tr:nth-child(even) { background: #fafafa; }
        tbody td { padding: 10px 12px; font-size: 12px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-concluido { background: #d1fae5; color: #065f46; }
        .badge-cancelado { background: #fee2e2; color: #991b1b; }
        .badge-outro { background: #e5e7eb; color: #374151; }
        .footer { margin-top: 40px; text-align: center; font-size: 11px; color: #aaa; border-top: 1px solid #e0e0e0; padding-top: 16px; }
    </style>
</head>
<body>

<div class="header">
    <h1>BARBER PRO</h1>
    <p>Relatório Financeiro</p>
</div>

<div class="periodo">
    Período: <strong th:text="${dataInicio}">01/05/2026</strong>
    até <strong th:text="${dataFim}">31/05/2026</strong>
</div>

<div class="cards">
    <div class="card destaque">
        <div class="label">Receita Total</div>
        <div class="valor" th:text="'R$ ' + ${#numbers.formatDecimal(receitaTotal, 1, 'COMMA', 2, 'POINT')}">R$ 0,00</div>
    </div>
    <div class="card">
        <div class="label">Lucro da Casa</div>
        <div class="valor" th:text="'R$ ' + ${#numbers.formatDecimal(lucroCasa, 1, 'COMMA', 2, 'POINT')}">R$ 0,00</div>
    </div>
    <div class="card">
        <div class="label">Comissões</div>
        <div class="valor" th:text="'R$ ' + ${#numbers.formatDecimal(totalComissoes, 1, 'COMMA', 2, 'POINT')}">R$ 0,00</div>
    </div>
    <div class="card">
        <div class="label">Atendimentos</div>
        <div class="valor" th:text="${quantidadeAtendimentos}">0</div>
    </div>
</div>

<table>
    <thead>
    <tr>
        <th>Data</th>
        <th>Cliente</th>
        <th>Serviço</th>
        <th>Barbeiro</th>
        <th>Status</th>
        <th>Valor</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="ag : ${extrato}">
        <td th:text="${#temporals.format(ag.dataHoraInicio, 'dd/MM/yyyy HH:mm')}">-</td>
        <td th:text="${ag.cliente != null ? ag.cliente.nome : 'Anônimo'}">-</td>
        <td th:text="${ag.servico != null ? ag.servico.nome : '-'}">-</td>
        <td th:text="${ag.barbeiro != null ? ag.barbeiro.nome : '-'}">-</td>
        <td>
                <span class="badge"
                      th:classappend="${ag.status == 'CONCLUIDO'} ? 'badge-concluido' : (${ag.status == 'CANCELADO'} ? 'badge-cancelado' : 'badge-outro')"
                      th:text="${ag.status}">-</span>
        </td>
        <td th:text="'R$ ' + ${#numbers.formatDecimal(ag.valorCobrado, 1, 'COMMA', 2, 'POINT')}">-</td>
    </tr>
    <tr th:if="${#lists.isEmpty(extrato)}">
        <td colspan="6" style="text-align:center; padding: 20px; color: #888;">Nenhum atendimento neste período.</td>
    </tr>
    </tbody>
</table>

<div class="footer">
    Gerado automaticamente pelo sistema Barber Pro
</div>

</body>
</html>
